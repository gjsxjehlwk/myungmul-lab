<!doctype html><html lang="ko"><head><meta charset="utf-8"><base href="/apps/smartphone-sensor-physics-lab/"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#091a30"><title>스마트폰 센서 물리 실험실</title><link rel="stylesheet" href="styles.css">    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
</head><body>
<header><div class="topline"><span>FIELD NOTE / 02</span><span>LOCAL DATA · NO UPLOAD</span></div><h1>내 손안의<br><i>센서 물리 실험실</i></h1><p>스마트폰의 움직임과 방향을 시간에 따라 기록하고, 그래프를 증거로 물리 현상을 설명하세요.</p></header>
<main>
 <section class="setup card"><div class="number">01</div><div class="content"><h2>실험 설정</h2><div class="modes" role="radiogroup" aria-label="센서 모드"><button class="mode active" data-mode="acceleration">가속도<small>m/s² · x · y · z · 합성</small></button><button class="mode" data-mode="orientation">기울기·방향<small>° · α · β · γ</small></button><button class="mode" data-mode="magnetometer">자기장<small>µT · x · y · z · 합성</small></button></div><div class="grid"><label>실험 제목<input id="title" value="스마트폰 움직임 관찰"></label><label>측정 시간 (초)<input id="duration" type="number" min="5" max="300" value="30"></label></div><div id="support" class="status" role="status"></div><label class="safety"><input id="safe" type="checkbox"> 스마트폰을 던지거나 위험한 장비에 부착하지 않고, 낙하와 주변 장애물을 확인했습니다.</label><div class="actions"><button id="permission" class="accent">센서 사용 준비</button><button id="example">예제 데이터</button><label class="file">CSV 불러오기<input id="file" type="file" accept=".csv,text/csv"></label></div></div></section>
 <section class="live card dark"><div class="number">02</div><div class="content"><div class="live-head"><div><h2>실시간 기록</h2><p id="meta">대기 중 · 0개 · 실제 간격 —</p></div><div id="timer">00:00.0</div></div><div class="controls"><button id="start" class="accent">기록 시작</button><button id="pause" disabled>일시정지</button><button id="stop" disabled>종료</button><button id="clear">초기화</button></div><div class="plot-wrap"><canvas id="plot" width="1000" height="430" aria-label="센서 시간 그래프"></canvas></div><div id="toggles" class="toggles"></div><div class="range"><label>분석 시작 (초)<input id="from" type="number" min="0" step="0.1" value="0"></label><label>분석 끝 (초)<input id="to" type="number" min="0" step="0.1" value="30"></label><label>세로축 범위<select id="scale"><option value="auto">자동</option><option value="20">±20</option><option value="50">±50</option><option value="180">±180</option></select></label></div><div id="summary" class="summary"></div></div></section>
 <section class="card"><div class="number">03</div><div class="content"><h2>증거로 결론 쓰기</h2><label>그래프에서 찾은 특징<textarea id="feature" rows="3" placeholder="어느 축이, 언제, 어떻게 변했나요?"></textarea></label><label>오차 원인과 센서의 한계<textarea id="error" rows="3" placeholder="기기 방향, 샘플링 간격, 센서 종류의 영향을 생각해 보세요."></textarea></label><label>결론<textarea id="conclusion" rows="3" placeholder="관찰한 증거를 포함해 결론을 적으세요."></textarea></label><div class="actions"><button id="download" class="accent">원자료 CSV 저장</button></div></div></section>
</main><footer>위치·이름·기기 식별자를 수집하지 않으며, 센서 자료는 이 브라우저에서만 처리됩니다.</footer><script type="module" src="app.js"></script></body></html>
